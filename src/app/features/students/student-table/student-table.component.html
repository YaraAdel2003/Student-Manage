<div class="table-card">
  <div class="table-responsive">
    <table class="table align-middle mb-0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Age</th>
          <th>Department</th>
          <th>GPA</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody *ngIf="students?.length; else emptyState">
        <tr *ngFor="let student of students">
          <td>{{ student.id }}</td>
          <td>{{ student.firstName }} {{ student.lastName }}</td>
          <td>{{ student.age }}</td>
          <td>{{ student.department }}</td>
          <td>{{ student.GPA }}</td>
          <td class="actions-cell">
            <a class="btn btn-sm btn-outline-primary" [routerLink]="['/student', student.id]">
              View
            </a>
            <button
              type="button"
              class="btn btn-sm btn-outline-danger"
              (click)="onDelete(student.id)"
            >
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<ng-template #emptyState>
  <tbody>
    <tr>
      <td colspan="6" class="empty-state">
        No students available yet. Add a new student to populate the table.
      </td>
    </tr>
  </tbody>
</ng-template>
